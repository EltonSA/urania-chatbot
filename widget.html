<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <title>Widget do Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',
              500:'#22c55e',600:'#1C8B3C',700:'#15803d',800:'#166534',900:'#14532d'
            }
          },
          fontFamily: {
            sans: ['Inter','system-ui','-apple-system','BlinkMacSystemFont','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-6px);opacity:1}}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

    .messages{padding:12px 8px;overflow-y:auto;flex:1;min-height:0;scroll-behavior:smooth}
    .messages::-webkit-scrollbar{width:5px}
    .messages::-webkit-scrollbar-track{background:transparent}
    .messages::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
    .messages::-webkit-scrollbar-thumb:hover{background:#9ca3af}

    .msg-row{display:flex;margin-bottom:14px;animation:fadeIn .3s ease}
    .msg-row.bot{justify-content:flex-start}
    .msg-row.user{justify-content:flex-end}

    .bubble{max-width:82%;padding:12px 16px;border-radius:20px;font-size:14.5px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;transition:transform .15s ease}
    .bubble.bot .bubble-body{min-width:0}
    .bubble.bot.with-media{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      width:fit-content;
      max-width:82%;
      min-width:0;
    }
    .bubble.bot.with-media .bubble-body{
      width:100%;
      max-width:100%;
      box-sizing:border-box;
      overflow-wrap:break-word;
      word-break:break-word;
      hyphens:auto;
    }
    .bubble.bot.with-media .attachments{
      align-self:flex-start;
      width:auto;
      max-width:min(82vw,720px);
    }
    .bubble.bot.with-media .gif-thumb{
      width:auto;
      max-width:100%;
      height:auto;
      display:block;
      box-sizing:border-box;
    }
    .bubble.bot.with-media .pdf-inline{
      width:auto;
      max-width:100%;
      box-sizing:border-box;
    }
    .bubble:hover{transform:translateY(-1px)}
    .bubble.bot{background:linear-gradient(135deg,#1C8B3C,#16a34a);color:#fff;border-bottom-left-radius:6px;box-shadow:0 2px 10px rgba(28,139,60,.15)}
    .bubble.user{background:#fff;border:1.5px solid #e5e7eb;border-bottom-right-radius:6px;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.04)}

    .attachments{margin-top:10px}

    .gif-thumb{width:100%;max-width:700px;border-radius:14px;display:block;margin-top:8px;border:1px solid rgba(148,163,184,.5);cursor:zoom-in;background:#fff}

    .pdf-inline{margin-top:10px;width:100%;max-width:720px;background:#fff;border:1px solid rgba(148,163,184,.5);border-radius:14px;overflow:hidden}
    .pdf-inline-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f0fdf4;border-bottom:1px solid rgba(226,232,240,.8);gap:10px}
    .pdf-inline-title{font-size:13px;font-weight:700;color:#065f46;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
    .pdf-inline-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pdf-inline-btn{border:none;background:#1C8B3C;color:#fff;padding:6px 12px;font-size:12px;border-radius:999px;cursor:pointer;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .pdf-inline-btn.secondary{background:#fff;color:#1C8B3C;border:1px solid #1C8B3C}
    .pdf-inline-frame{width:100%;height:420px;border:none;background:#f9fafb;display:block}

    .typing-indicator{background:#1C8B3C;color:#f9fafb;padding:10px 14px;display:flex;gap:4px;align-items:center}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.6);animation:typing 1.4s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}

    .side-avatar{width:40px;margin-top:6px;display:flex;justify-content:center;flex-shrink:0}
    .side-avatar-inner{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#1C8B3C,#16a34a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;overflow:hidden;object-fit:cover;box-shadow:0 2px 8px rgba(28,139,60,.15)}
    .side-avatar-inner img{width:100%;height:100%;object-fit:cover}

    .resolve-card{margin-top:12px;background:#fff;border:2px solid #f3f4f6;border-radius:16px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.03)}
    .resolve-card.resolve-card-done{flex-direction:column;align-items:stretch;justify-content:flex-start;border-color:#dcfce7;background:#f0fdf4}
    .resolve-text{font-size:13px;color:#0f172a;font-weight:600}
    .resolve-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .resolve-btn{border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s ease;box-shadow:0 2px 4px rgba(0,0,0,.08)}
    .resolve-btn:hover{transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,.12)}
    .resolve-btn:active{transform:translateY(0)}
    .resolve-yes{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff}
    .resolve-no{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
    .resolve-support{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}

    .whatsapp-support-btn{display:inline-block;margin-top:10px;padding:8px 14px;background:#25D366;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;transition:all .2s ease;box-shadow:0 2px 6px rgba(37,211,102,.25)}
    .whatsapp-support-btn:hover{background:#20BA5A;transform:translateY(-1px);box-shadow:0 4px 10px rgba(37,211,102,.3)}

    .modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:50;padding:16px}
    .modal-overlay.open{display:flex}
    .modal-content{width:100%;max-width:1000px;max-height:92vh;background:#020617;border-radius:16px;padding:10px;box-shadow:0 24px 48px rgba(0,0,0,.4);position:relative;display:flex;flex-direction:column;align-items:center}
    .modal-close{position:absolute;top:8px;right:10px;border:none;background:rgba(15,23,42,.7);color:#e5e7eb;border-radius:999px;width:30px;height:30px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .modal-close:hover{background:rgba(239,68,68,.7)}
    .modal-caption{margin-top:8px;font-size:12px;color:#e5e7eb;text-align:center}

    #gif-modal img{width:100%;max-width:1200px;max-height:80vh;border-radius:10px;display:block;object-fit:contain}

    #pdf-modal .modal-content{background:#fff}
    #pdf-modal-frame{width:100%;height:80vh;border:none;display:block;border-radius:10px;background:#f9fafb}
    #pdf-modal-actions{margin-top:10px;text-align:center;width:100%;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    #pdf-modal-download{padding:10px 14px;background:#1C8B3C;color:white;border-radius:999px;text-decoration:none;font-size:13px;font-weight:700;border:1px solid rgba(0,0,0,.06);box-shadow:0 4px 12px rgba(28,139,60,.15)}

    body.embed-mode{background:#fff}
    body.embed-mode .wrapper{padding:4px 6px 6px}
    body.embed-mode .top-row{display:none}
    body.embed-mode .chat-area{margin-top:0}
    body.embed-mode .side-avatar{display:none}
    body.embed-mode .chat-box{border:none;padding:4px 4px;background:transparent;box-shadow:none;border-radius:0}
    body.embed-mode .messages{padding:6px 4px}
    body.embed-mode .msg-row{margin-bottom:8px}
    body.embed-mode .bubble{font-size:14px;padding:9px 13px;border-radius:16px;max-width:90%}
    body.embed-mode .bubble.bot.with-media{max-width:90%}
    body.embed-mode .input-row{min-height:44px;border-radius:12px}
    body.embed-mode .input-row input{padding:9px 14px;font-size:14px}
    body.embed-mode .input-row button{padding:0 18px;font-size:14px;min-width:72px}
    body.embed-mode .status-line{font-size:11px;margin-top:3px}
    body.embed-mode .gif-thumb{max-width:100%}
    body.embed-mode .pdf-inline-frame{height:280px}

    @media(max-width:720px){
      .top-right{display:none}
      .chat-area{flex-direction:column}
      .side-avatar{display:none}
      .pdf-inline-title{max-width:55%}
      .pdf-inline-frame{height:360px}
    }
  </style>
</head>

<body class="h-screen w-screen m-0 p-0 bg-gradient-to-br from-brand-50/50 via-white to-gray-50 font-sans text-gray-900 flex items-stretch justify-stretch overflow-hidden antialiased">

  <div class="wrapper w-full h-full bg-white flex flex-col overflow-hidden p-4 sm:p-6">

    <!-- Top Row -->
    <div class="top-row flex items-center justify-between gap-4 pb-4 border-b border-gray-100 mb-1">
      <div class="top-left flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-600 to-brand-500 flex items-center justify-center text-2xl text-white overflow-hidden shadow-lg shadow-brand-600/15 hover:scale-105 transition-transform">
          <img src="/static/logo-urania.jpg" alt="Avatar" class="w-full h-full object-cover" />
        </div>
        <div>
          <p class="text-xl font-bold text-gray-900 tracking-tight leading-tight">Urânia +</p>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
            <p class="text-[11px] text-gray-400 font-medium">Assistente Virtual</p>
          </div>
        </div>
      </div>
      <div class="top-right text-xs text-gray-400 font-medium"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area mt-3 flex gap-3 items-start flex-1 min-h-0">
      <div class="side-avatar">
        <div class="side-avatar-inner">
          <img src="/static/logo-urania.jpg" alt="Avatar" />
        </div>
      </div>

      <div class="chat-box flex-1 rounded-2xl border border-gray-100 p-3 sm:p-4 bg-gray-50/30 flex flex-col gap-3 min-h-0 max-h-full">
        <div id="chat-messages" class="messages"></div>

        <div class="input-row flex items-stretch rounded-2xl border-2 border-gray-200 overflow-hidden bg-white shadow-sm transition-all duration-200 min-h-[52px] focus-within:border-brand-500 focus-within:shadow-md focus-within:shadow-brand-100/50 focus-within:-translate-y-px">
          <input id="chat-input" type="text"
            class="flex-1 border-none px-4 py-3.5 text-[15px] outline-none bg-transparent text-gray-900 placeholder:text-gray-400"
            placeholder="Digite sua mensagem..." />
          <button id="chat-send"
            class="border-none px-6 sm:px-8 bg-gradient-to-r from-brand-600 to-brand-500 text-white text-[14px] font-semibold cursor-pointer whitespace-nowrap transition-all duration-200 hover:-translate-y-px hover:shadow-md active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed min-w-[90px] sm:min-w-[110px]">
            Enviar
          </button>
        </div>

        <div id="chat-status" class="status-line text-[11px] text-gray-400 text-right mt-0.5 font-medium pr-1">Pronto para responder.</div>
      </div>
    </div>
  </div>

  <!-- MODAL GIF -->
  <div id="gif-modal" class="modal-overlay">
    <div class="modal-content">
      <button id="gif-modal-close" class="modal-close">&times;</button>
      <img id="gif-modal-img" src="" alt="GIF ampliado" />
      <div id="gif-modal-caption" class="modal-caption"></div>
    </div>
  </div>

  <!-- MODAL PDF -->
  <div id="pdf-modal" class="modal-overlay">
    <div class="modal-content">
      <button id="pdf-modal-close" class="modal-close">&times;</button>
      <iframe id="pdf-modal-frame" src=""></iframe>
      <div id="pdf-modal-actions">
        <a id="pdf-modal-download" href="#" download>Baixar PDF</a>
      </div>
    </div>
  </div>

<script>
  const chatMessages = document.getElementById("chat-messages");
  const chatInput = document.getElementById("chat-input");
  const chatSend = document.getElementById("chat-send");
  const chatStatus = document.getElementById("chat-status");

  const gifModal = document.getElementById("gif-modal");
  const gifModalImg = document.getElementById("gif-modal-img");
  const gifModalCaption = document.getElementById("gif-modal-caption");
  const gifModalClose = document.getElementById("gif-modal-close");

  const pdfModal = document.getElementById("pdf-modal");
  const pdfModalFrame = document.getElementById("pdf-modal-frame");
  const pdfModalDownload = document.getElementById("pdf-modal-download");
  const pdfModalClose = document.getElementById("pdf-modal-close");

  let chatHistory = [];

  const isEmbedded = new URLSearchParams(window.location.search).has("embed");
  if (isEmbedded) document.body.classList.add("embed-mode");

  let messageLog = [];
  let _isRestoring = false;

  function saveChat(){
    try {
      sessionStorage.setItem("ucw_msgs", JSON.stringify(messageLog));
      sessionStorage.setItem("ucw_hist", JSON.stringify(chatHistory));
    } catch(_){}
  }

  function restoreChat(){
    try {
      const saved = JSON.parse(sessionStorage.getItem("ucw_msgs"));
      const hist = JSON.parse(sessionStorage.getItem("ucw_hist"));
      if(saved && saved.length > 0){
        _isRestoring = true;
        messageLog = saved;
        chatHistory = hist || [];
        saved.forEach(function(m){
          if(m.sequential){
            replayBotSequential(m);
          } else {
            addMessage(m.who, m.text, m.attachments || [], m.needsHumanSupport || false, false);
          }
        });
        _isRestoring = false;
        return true;
      }
    } catch(_){}
    return false;
  }

  const parentOrigin = (document.referrer && isEmbedded) ? new URL(document.referrer).origin : "*";

  function notifyParent(type, data){
    if(window.parent !== window){
      try { window.parent.postMessage(Object.assign({type: type}, data || {}), parentOrigin); } catch(_){}
    }
  }

  function scrollToBottom(){
    chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior:"smooth" });
  }

  function getOrCreateSessionId(){
    const store = isEmbedded ? sessionStorage : localStorage;
    const key = "chat_session_id";
    let sessionId = store.getItem(key);
    if(!sessionId){
      const raw = (crypto.randomUUID ? crypto.randomUUID() : (String(Date.now()) + Math.random()));
      sessionId = raw.toString().replaceAll("-", "");
      store.setItem(key, sessionId);
    }
    return sessionId;
  }

  function openGifModal(url, name){
    gifModalImg.src = url;
    gifModalCaption.textContent = name || "Pré-visualização do GIF";
    gifModal.classList.add("open");
  }
  function closeGifModal(){
    gifModal.classList.remove("open");
    gifModalImg.src = "";
    gifModalCaption.textContent = "";
  }
  gifModalClose.addEventListener("click", closeGifModal);
  gifModal.addEventListener("click", (e)=>{ if(e.target === gifModal) closeGifModal(); });

  function openPdfModal(url, name){
    pdfModalFrame.src = url + "#toolbar=1";
    pdfModalDownload.href = url;
    pdfModalDownload.download = name || "arquivo.pdf";
    pdfModal.classList.add("open");
  }
  function closePdfModal(){
    pdfModal.classList.remove("open");
    pdfModalFrame.src = "";
  }
  pdfModalClose.addEventListener("click", closePdfModal);
  pdfModal.addEventListener("click", (e)=>{ if(e.target === pdfModal) closePdfModal(); });

  function messagesBubbleWidthCap(){
    const messagesEl = document.getElementById("chat-messages");
    const mw = messagesEl ? messagesEl.clientWidth : 560;
    const embed = document.body.classList.contains("embed-mode");
    return mw * (embed ? 0.9 : 0.82);
  }

  /** Estima maxWidth antes da mídia existir no DOM (digitação + passos sequenciais). */
  function preSyncBubbleWidthFromAttachments(bubble, attachments){
    if(!bubble || !attachments || !attachments.length) return;
    const cap = messagesBubbleWidthCap();
    const pad = 36;
    const mw = (document.getElementById("chat-messages") || { clientWidth: 560 }).clientWidth;
    const embed = document.body.classList.contains("embed-mode");
    const attCap = embed ? Math.max(120, mw - 40) : Math.min(mw * 0.82, 720);

    const firstImg = attachments.find(function(a){ return a.type === "gif" || a.type === "image"; });
    if(firstImg){
      const im = new Image();
      im.onload = function(){
        const nw = im.naturalWidth || 0;
        const displayW = nw > 0 ? Math.min(nw, attCap) : attCap;
        if(displayW < 24) return;
        bubble.style.maxWidth = Math.min(displayW + pad, cap) + "px";
        scrollToBottom();
      };
      im.onerror = function(){};
      im.src = firstImg.url;
      return;
    }
    if(attachments.some(function(a){ return a.type === "pdf"; })){
      const displayW = Math.min(720, attCap);
      bubble.style.maxWidth = Math.min(displayW + pad, cap) + "px";
    }
  }

  /** Encolhe a bolha do bot para a largura da mídia, com quebra de linha no texto. */
  function syncBubbleWidthToMedia(bubble){
    if(!bubble || !bubble.classList.contains("with-media")) return;
    const att = bubble.querySelector(".attachments");
    if(!att) return;

    let measureRetries = 0;
    const run = function(){
      const cap = messagesBubbleWidthCap();
      let w = 0;
      att.querySelectorAll("img.gif-thumb").forEach(function(img){
        const rw = img.getBoundingClientRect().width;
        if(rw > w) w = rw;
      });
      const pdf = att.querySelector(".pdf-inline");
      if(pdf){
        const rw = pdf.getBoundingClientRect().width;
        if(rw > w) w = rw;
      }
      if(w < 48){
        if(measureRetries < 12){
          measureRetries++;
          requestAnimationFrame(function(){ requestAnimationFrame(run); });
        }
        return;
      }
      const pad = 36;
      bubble.style.maxWidth = Math.min(w + pad, cap) + "px";
      scrollToBottom();
    };

    const imgs = att.querySelectorAll("img.gif-thumb");
    let pending = 0;
    imgs.forEach(function(img){
      if(!img.complete){
        pending++;
        img.addEventListener("load", function onImg(){
          img.removeEventListener("load", onImg);
          pending--;
          if(pending <= 0) requestAnimationFrame(function(){ requestAnimationFrame(run); });
        });
      }
    });
    if(pending === 0) requestAnimationFrame(function(){ requestAnimationFrame(run); });

    const iframe = att.querySelector("iframe.pdf-inline-frame");
    if(iframe){
      iframe.addEventListener("load", function(){ setTimeout(run, 200); }, { once: true });
    }
  }

  function renderAttachments(containerEl, attachments=[]){
    if(!attachments || attachments.length === 0) return;

    const attDiv = document.createElement("div");
    attDiv.className = "attachments";

    attachments.forEach(att=>{
      if(att.type === "gif" || att.type === "image"){
        const img = document.createElement("img");
        img.src = att.url;
        img.alt = att.name || (att.type === "image" ? "Imagem" : "GIF");
        img.className = "gif-thumb";
        img.addEventListener("click", ()=>openGifModal(att.url, att.name));
        attDiv.appendChild(img);
      }

      if(att.type === "pdf"){
        const pdfWrap = document.createElement("div");
        pdfWrap.className = "pdf-inline";

        const header = document.createElement("div");
        header.className = "pdf-inline-header";

        const title = document.createElement("div");
        title.className = "pdf-inline-title";
        title.textContent = att.name || "Documento PDF";

        const actions = document.createElement("div");
        actions.className = "pdf-inline-actions";

        const openBtn = document.createElement("button");
        openBtn.className = "pdf-inline-btn";
        openBtn.textContent = "Ampliar";
        openBtn.onclick = ()=>openPdfModal(att.url, att.name);

        const downloadBtn = document.createElement("a");
        downloadBtn.href = att.url;
        downloadBtn.download = "";
        downloadBtn.textContent = "Baixar";
        downloadBtn.className = "pdf-inline-btn secondary";

        actions.appendChild(openBtn);
        actions.appendChild(downloadBtn);

        header.appendChild(title);
        header.appendChild(actions);

        const iframe = document.createElement("iframe");
        iframe.className = "pdf-inline-frame";
        iframe.src = att.url + "#toolbar=1&view=FitH";

        pdfWrap.appendChild(header);
        pdfWrap.appendChild(iframe);

        attDiv.appendChild(pdfWrap);
      }
    });

    containerEl.appendChild(attDiv);
    if(containerEl.classList && containerEl.classList.contains("with-media")){
      syncBubbleWidthToMedia(containerEl);
    }
  }

  function showTypingIndicator(){
    const row = document.createElement("div");
    row.className = "msg-row bot typing-indicator-row";
    row.id = "typing-indicator";

    const avatarDiv = document.createElement("div");
    avatarDiv.className = "side-avatar";
    const avatarInner = document.createElement("div");
    avatarInner.className = "side-avatar-inner";
    const avatarImg = document.createElement("img");
    avatarImg.src = "/static/logo-urania.jpg";
    avatarImg.alt = "Avatar";
    avatarInner.appendChild(avatarImg);
    avatarDiv.appendChild(avatarInner);
    row.appendChild(avatarDiv);

    const bubble = document.createElement("div");
    bubble.className = "bubble bot typing-indicator";
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
    return row;
  }

  function removeTypingIndicator(){
    const indicator = document.getElementById("typing-indicator");
    if(indicator) indicator.remove();
  }

  function typeText(element, text, speed = 30, callback){
    element.textContent = "";
    let i = 0;
    const timer = setInterval(() => {
      if(i < text.length){
        element.textContent += text.charAt(i);
        i++;
        scrollToBottom();
      } else {
        clearInterval(timer);
        if(callback) callback();
      }
    }, speed);
  }

  function sleep(ms){
    return new Promise(function(resolve){ setTimeout(resolve, ms); });
  }

  function typeTextPromise(element, text, speed){
    return new Promise(function(resolve){
      if(!text){
        resolve();
        return;
      }
      typeText(element, text, speed || 30, resolve);
    });
  }

  function createBotRowWithBubble(){
    const row = document.createElement("div");
    row.className = "msg-row bot";
    const avatarDiv = document.createElement("div");
    avatarDiv.className = "side-avatar";
    const avatarInner = document.createElement("div");
    avatarInner.className = "side-avatar-inner";
    const avatarImg = document.createElement("img");
    avatarImg.src = "/static/logo-urania.jpg";
    avatarImg.alt = "Avatar";
    avatarInner.appendChild(avatarImg);
    avatarDiv.appendChild(avatarInner);
    row.appendChild(avatarDiv);
    const bubble = document.createElement("div");
    bubble.className = "bubble bot";
    const body = document.createElement("div");
    body.className = "bubble-body";
    bubble.appendChild(body);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
    return { row: row, bubble: bubble, body: body };
  }

  /** Resposta em sequência: texto → 2s → mídia → 2s → próximo passo (reply_steps). */
  const SEQUENTIAL_GAP_MS = 2000;

  async function playBotSequentialResponse(data){
    const opening = (data.reply || "").trim();
    const steps = data.reply_steps || [];
    const needsHuman = !!data.needs_human_support;
    let lastRow = null;

    if(opening){
      const c = createBotRowWithBubble();
      await typeTextPromise(c.body, opening, 30);
      if(needsHuman && steps.length === 0) addWhatsAppButton(c.bubble);
      lastRow = c.row;
      scrollToBottom();
      if(steps.length > 0){
        await sleep(SEQUENTIAL_GAP_MS);
      }
    }

    for(let i = 0; i < steps.length; i++){
      const st = steps[i] || {};
      const txt = (st.text || "").trim();
      const atts = st.attachments || [];
      const c = createBotRowWithBubble();
      if(atts.length > 0){
        c.bubble.classList.add("with-media");
        preSyncBubbleWidthFromAttachments(c.bubble, atts);
      }
      await typeTextPromise(c.body, txt, 30);
      if(atts.length > 0){
        await sleep(SEQUENTIAL_GAP_MS);
        renderAttachments(c.bubble, atts);
      }
      const isLast = i === steps.length - 1;
      if(needsHuman && isLast) addWhatsAppButton(c.bubble);
      lastRow = c.row;
      scrollToBottom();
      if(!isLast){
        await sleep(SEQUENTIAL_GAP_MS);
      }
    }

    if(!_isRestoring){
      messageLog.push({
        who: "bot",
        sequential: {
          opening: opening,
          steps: steps.map(function(s){
            return { text: (s && s.text) || "", attachments: (s && s.attachments) || [] };
          })
        },
        needsHumanSupport: needsHuman
      });
      saveChat();
      notifyParent("ucw-new-message");
    }
    return lastRow;
  }

  function replayBotSequential(msg){
    const seq = msg.sequential || {};
    const opening = (seq.opening || "").trim();
    const steps = seq.steps || [];
    const nh = !!msg.needsHumanSupport;
    if(opening){
      addMessage("bot", opening, [], nh && steps.length === 0, false);
    }
    steps.forEach(function(st, idx){
      const isLast = idx === steps.length - 1;
      addMessage("bot", (st && st.text) || "", (st && st.attachments) || [], nh && isLast, false);
    });
  }

  function addMessage(who, text, attachments=[], needsHumanSupport=false, animateTyping=false){
    const row = document.createElement("div");
    row.className = "msg-row " + who;

    if (who === "bot") {
      const avatarDiv = document.createElement("div");
      avatarDiv.className = "side-avatar";
      const avatarInner = document.createElement("div");
      avatarInner.className = "side-avatar-inner";
      const avatarImg = document.createElement("img");
      avatarImg.src = "/static/logo-urania.jpg";
      avatarImg.alt = "Avatar";
      avatarInner.appendChild(avatarImg);
      avatarDiv.appendChild(avatarInner);
      row.appendChild(avatarDiv);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble " + who;

    if(who === "bot"){
      const bubbleBody = document.createElement("div");
      bubbleBody.className = "bubble-body";
      bubble.appendChild(bubbleBody);
      const hasAtt = attachments && attachments.length > 0;
      if(hasAtt){
        bubble.classList.add("with-media");
        preSyncBubbleWidthFromAttachments(bubble, attachments);
      }

      if(animateTyping){
        if(text){
          typeText(bubbleBody, text, 30, () => {
            renderAttachments(bubble, attachments);
            if(needsHumanSupport) addWhatsAppButton(bubble);
          });
        } else {
          renderAttachments(bubble, attachments);
          if(needsHumanSupport) addWhatsAppButton(bubble);
        }
      } else {
        bubbleBody.textContent = text || "";
        renderAttachments(bubble, attachments);
        if(needsHumanSupport) addWhatsAppButton(bubble);
      }
    } else {
      bubble.textContent = text || "";
    }

    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();

    if(!_isRestoring){
      messageLog.push({who: who, text: text, attachments: attachments || [], needsHumanSupport: needsHumanSupport || false});
      saveChat();
      if(who === "bot") notifyParent("ucw-new-message");
    }

    return bubble;
  }

  let whatsappNumber = "";
  /** Só o botão "Solicitar suporte" no cartão; Sim/Não ficam sempre. WhatsApp por needs_human_support não usa isto. */
  let showResolutionCardSupportButton = true;

  function addWhatsAppButton(container){
    if(!whatsappNumber) return;
    const whatsappBtn = document.createElement("a");
    whatsappBtn.href = "https://wa.me/" + whatsappNumber;
    whatsappBtn.target = "_blank";
    whatsappBtn.className = "whatsapp-support-btn";
    whatsappBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-1px"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>Falar com Suporte no WhatsApp';
    container.appendChild(whatsappBtn);
  }

  async function sendFeedback(resolved, action){
    const sessionId = getOrCreateSessionId();
    const payload = { session_id: sessionId };
    if(action === "support") payload.action = "support";
    else payload.resolved = !!resolved;
    const res = await fetch("/chat/feedback", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const t = await res.text().catch(()=> "");
      throw new Error(t || "Falha ao enviar feedback");
    }
  }

  function addResolveCard(afterRowEl){
    const resolveRow = document.createElement("div");
    resolveRow.className = "msg-row bot";
    
    const avatarDiv = document.createElement("div");
    avatarDiv.className = "side-avatar";
    resolveRow.appendChild(avatarDiv);
    
    const card = document.createElement("div");
    card.className = "resolve-card";

    const left = document.createElement("div");
    left.className = "resolve-text";
    left.textContent = "Conseguiu resolver o seu problema?";

    const actions = document.createElement("div");
    actions.className = "resolve-actions";

    const yesBtn = document.createElement("button");
    yesBtn.className = "resolve-btn resolve-yes";
    yesBtn.textContent = "Sim";

    const noBtn = document.createElement("button");
    noBtn.className = "resolve-btn resolve-no";
    noBtn.textContent = "Não";

    let supportBtn = null;
    if(showResolutionCardSupportButton){
      supportBtn = document.createElement("button");
      supportBtn.className = "resolve-btn resolve-support";
      supportBtn.textContent = "Solicitar suporte";
      supportBtn.setAttribute("type", "button");
    }

    actions.appendChild(yesBtn);
    actions.appendChild(noBtn);
    if(supportBtn) actions.appendChild(supportBtn);

    card.appendChild(left);
    card.appendChild(actions);

    const lock = ()=>{
      yesBtn.disabled = true;
      noBtn.disabled = true;
      if(supportBtn) supportBtn.disabled = true;
    };

    yesBtn.addEventListener("click", async ()=>{
      lock();
      try{
        await sendFeedback(true);
        card.classList.add("resolve-card-done");
        card.innerHTML = '<div class="resolve-text">Obrigado pela sua resposta! Registramos que você conseguiu resolver.</div>';
        scrollToBottom();
      }catch(e){
        console.error(e);
        card.innerHTML = '<div class="resolve-text" style="color:#b91c1c;">Erro ao enviar. Tente novamente.</div>';
      }
    });

    noBtn.addEventListener("click", async ()=>{
      lock();
      try{
        await sendFeedback(false);
        card.classList.add("resolve-card-done");
        card.innerHTML = '<div class="resolve-text">Obrigado pela sua resposta! Vamos usar seu feedback para melhorar o atendimento.</div>';
        scrollToBottom();
      }catch(e){
        console.error(e);
        card.innerHTML = '<div class="resolve-text" style="color:#b91c1c;">Erro ao enviar. Tente novamente.</div>';
      }
    });

    if(supportBtn){
      supportBtn.addEventListener("click", async ()=>{
        lock();
        try{
          await sendFeedback(false, "support");
          card.classList.add("resolve-card-done");
          const wrap = document.createElement("div");
          wrap.className = "resolve-text";
          wrap.style.maxWidth = "100%";
          const thanks = document.createElement("div");
          thanks.textContent = "Obrigado pela sua resposta!";
          const t = document.createElement("div");
          t.style.marginTop = "6px";
          t.textContent = whatsappNumber
            ? "Registramos seu pedido de suporte. Você pode falar conosco pelo WhatsApp."
            : "Registramos seu pedido de suporte. Nossa equipe dará continuidade ao seu atendimento.";
          wrap.appendChild(thanks);
          wrap.appendChild(t);
          if(whatsappNumber){
            const wa = document.createElement("a");
            wa.href = "https://wa.me/" + whatsappNumber;
            wa.target = "_blank";
            wa.rel = "noopener noreferrer";
            wa.className = "whatsapp-support-btn";
            wa.style.marginTop = "10px";
            wa.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-1px"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>Abrir WhatsApp';
            wrap.appendChild(wa);
          }
          card.innerHTML = "";
          card.appendChild(wrap);
          scrollToBottom();
        }catch(e){
          console.error(e);
          card.innerHTML = '<div class="resolve-text" style="color:#b91c1c;">Erro ao enviar. Tente novamente.</div>';
        }
      });
    }

    resolveRow.appendChild(card);
    afterRowEl.parentNode.insertBefore(resolveRow, afterRowEl.nextSibling);
    scrollToBottom();
  }

  async function sendChat(){
    const text = chatInput.value.trim();
    if(!text) return;

    addMessage("user", text);
    chatHistory.push({ role:"user", content:text });

    chatInput.value = "";
    chatInput.focus();
    chatSend.disabled = true;
    chatStatus.textContent = "Consultando IA...";
    
    const typingRow = showTypingIndicator();

    try{
      const sessionId = getOrCreateSessionId();

      const res = await fetch("/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          message: text,
          session_id: sessionId,
          history: chatHistory
        })
      });

      if(!res.ok){
        if(res.status === 503){
          const statusData = await checkChatStatus();
          const errorMsg = statusData.error_message || "Serviço temporariamente indisponível";
          throw new Error("SERVICE_UNAVAILABLE:" + errorMsg);
        }
        const errText = await res.text().catch(()=> "");
        throw new Error(errText || "Erro no servidor");
      }

      const data = await res.json();
      
      removeTypingIndicator();

      let botRowForResolve = null;

      if(data.reply_steps && data.reply_steps.length > 0){
        botRowForResolve = await playBotSequentialResponse(data);
        const histParts = [];
        if((data.reply || "").trim()) histParts.push((data.reply || "").trim());
        data.reply_steps.forEach(function(s){
          if(s && (s.text || "").trim()) histParts.push((s.text || "").trim());
        });
        chatHistory.push({ role:"assistant", content: histParts.join("\n\n") });
      } else {
        const botBubble = addMessage(
          "bot",
          data.reply || "",
          data.attachments || [],
          data.needs_human_support || false,
          true
        );
        botRowForResolve = botBubble.closest(".msg-row");
        chatHistory.push({ role:"assistant", content: data.reply || "" });
      }

      if (data.should_ask_resolution === true && botRowForResolve) {
        await checkChatStatus();
        const delay = (data.reply_steps && data.reply_steps.length)
          ? 800
          : ((data.reply || "").length * 30 + 500);
        setTimeout(function(){
          addResolveCard(botRowForResolve);
        }, delay);
      }

      chatStatus.textContent = "Pronto para outra pergunta.";
    } catch(err){
      console.error("Erro no chat:", err);
      removeTypingIndicator();
      
      const errMsg = err.message || String(err);
      if(errMsg.startsWith("SERVICE_UNAVAILABLE:")){
        const errorDetail = errMsg.replace("SERVICE_UNAVAILABLE:", "");
        
        chatInput.disabled = true;
        chatSend.disabled = true;
        chatStatus.textContent = "Serviço temporariamente indisponível";
        
        addMessage(
          "bot",
          "O serviço de chat está temporariamente indisponível.\n\n" +
          errorDetail + "\n\n" +
          "Por favor, tente novamente mais tarde. Se o problema persistir, entre em contato com o suporte."
        );
        
        checkStatusPeriodically();
      } else {
        addMessage("bot", "Houve um erro ao processar sua mensagem. Por favor, tente novamente.");
        chatStatus.textContent = "Erro de conexão.";
      }
    } finally {
      if(!chatInput.disabled){
        chatSend.disabled = false;
      }
    }
  }

  chatSend.addEventListener("click", (e)=>{ e.preventDefault(); sendChat(); });
  chatInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ e.preventDefault(); sendChat(); }
  });

  async function checkChatStatus(){
    try{
      const res = await fetch("/chat/status");
      if(!res.ok) throw new Error("Erro ao verificar status");
      const data = await res.json();
      if(data.whatsapp_number) whatsappNumber = data.whatsapp_number;
      if(typeof data.resolution_card_support_button === "boolean"){
        showResolutionCardSupportButton = data.resolution_card_support_button;
      } else {
        showResolutionCardSupportButton = data.satisfaction_support_enabled !== false;
      }
      return data;
    }catch(err){
      console.error("Erro ao verificar status:", err);
      return { available: false, error_message: "Erro ao verificar status do serviço" };
    }
  }

  let statusCheckInterval = null;
  
  function checkStatusPeriodically(){
    if(statusCheckInterval){
      clearInterval(statusCheckInterval);
    }
    
    statusCheckInterval = setInterval(async () => {
      const status = await checkChatStatus();
      if(status.available){
        clearInterval(statusCheckInterval);
        statusCheckInterval = null;
        
        chatInput.disabled = false;
        chatSend.disabled = false;
        chatStatus.textContent = "Serviço restaurado! Pronto para conversar.";
        notifyParent("ucw-status", { available: true });
        
        addMessage(
          "bot",
          "O serviço foi restaurado! Agora posso ajudá-lo novamente.\n\n" +
          "Como posso ajudá-lo hoje?"
        );
      }
    }, 30000);
  }

  (async function init(){
    const restored = restoreChat();
    const status = await checkChatStatus();

    notifyParent("ucw-status", { available: status.available !== false });

    if(!status.available){
      chatInput.disabled = true;
      chatSend.disabled = true;
      chatStatus.textContent = "Serviço temporariamente indisponível";

      if(!restored){
        addMessage(
          "bot",
          "O serviço de chat está temporariamente indisponível.\n\n" +
          (status.error_message || "Por favor, tente novamente mais tarde.") +
          "\n\nSe o problema persistir, entre em contato com o suporte."
        );
      }

      checkStatusPeriodically();
    } else {
      if(!restored){
        addMessage(
          "bot",
          "Olá! Sou o assistente virtual deste ambiente de testes.\n" +
          "Você pode fazer perguntas e, quando fizer sentido, eu envio PDFs e GIFs cadastrados no painel."
        );
      }
    }
  })();
</script>
