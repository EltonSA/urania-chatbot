<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <title>Login - Urânia +</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',
              500:'#22c55e',600:'#1C8B3C',700:'#15803d',800:'#166534',900:'#14532d'
            }
          },
          fontFamily: {
            sans: ['Inter','system-ui','-apple-system','BlinkMacSystemFont','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:32px 32px}}
    .animate-fade-in-up{animation:fadeInUp .6s cubic-bezier(.4,0,.2,1) both}
    .animate-shake{animation:shake .4s ease}
    .loading{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
    .bg-grid{background-image:
      linear-gradient(rgba(28,139,60,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28,139,60,.04) 1px, transparent 1px);
      background-size:32px 32px;
      animation:gridMove 60s linear infinite}
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 via-brand-50/30 to-gray-50 font-sans text-gray-900 flex flex-col items-center justify-center p-4 sm:p-6 antialiased bg-grid">

  <!-- Decorative elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-[500px] h-[500px] bg-brand-200/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] bg-brand-100/20 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-50/30 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-[420px] animate-fade-in-up">
    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-2xl rounded-3xl shadow-xl shadow-gray-900/5 border border-white/60 p-8 sm:p-10">

      <!-- Logo Section -->
      <div class="text-center mb-10">
        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-600 to-brand-700 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-600/25 hover:scale-105 transition-transform duration-300 overflow-hidden ring-4 ring-brand-100">
          <img src="/static/logo-uraia.jpg" alt="Avatar Urânia +" class="w-full h-full object-cover" />
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-gray-900">Urânia +</h1>
        <p class="text-sm text-gray-500 mt-1.5 font-medium">Acesse o Painel Administrativo</p>
      </div>

      <!-- Error Message -->
      <div id="error-message" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium mb-6 hidden flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="error-text"></span>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="username">Usuário</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input
              type="text" id="username" name="username"
              class="w-full pl-11 pr-4 py-3.5 text-sm border border-gray-200 rounded-xl bg-gray-50/50 text-gray-900 placeholder:text-gray-400 outline-none transition-all duration-200 focus:border-brand-500 focus:ring-4 focus:ring-brand-50 focus:bg-white hover:border-gray-300"
              placeholder="Digite seu usuário" required autocomplete="username" autofocus
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Senha</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input
              type="password" id="password" name="password"
              class="w-full pl-11 pr-4 py-3.5 text-sm border border-gray-200 rounded-xl bg-gray-50/50 text-gray-900 placeholder:text-gray-400 outline-none transition-all duration-200 focus:border-brand-500 focus:ring-4 focus:ring-brand-50 focus:bg-white hover:border-gray-300"
              placeholder="Digite sua senha" required autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" id="btn-login"
          class="w-full py-3.5 text-[15px] font-semibold text-white bg-gradient-to-r from-brand-600 to-brand-700 rounded-xl cursor-pointer transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-brand-600/25 active:translate-y-0 active:shadow-md disabled:opacity-50 disabled:cursor-not-allowed disabled:translate-y-0 disabled:shadow-none shadow-md shadow-brand-600/20 mt-2">
          Entrar
        </button>
      </form>

      <!-- Footer -->
      <div class="text-center mt-8">
        <p class="text-xs text-gray-400 font-medium">
          Sistema de Gerenciamento de Chatbot
        </p>
      </div>
    </div>

    <!-- Security badge -->
    <div class="flex items-center justify-center gap-2 mt-5 text-[11px] text-gray-400 font-medium">
      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Conexão segura
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const btnLogin = document.getElementById("btn-login");
    const errorMessage = document.getElementById("error-message");
    const errorText = document.getElementById("error-text");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove("hidden");
      errorMessage.classList.add("animate-shake");
      setTimeout(() => {
        errorMessage.classList.add("hidden");
        errorMessage.classList.remove("animate-shake");
      }, 5000);
    }

    function setLoading(loading) {
      if (loading) {
        btnLogin.disabled = true;
        btnLogin.innerHTML = '<span class="loading"></span>Entrando...';
      } else {
        btnLogin.disabled = false;
        btnLogin.textContent = "Entrar";
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError("Por favor, preencha todos os campos.");
        return;
      }

      setLoading(true);
      errorMessage.classList.add("hidden");

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          showError(data.detail || "Usuário ou senha incorretos.");
          setLoading(false);
          return;
        }

        const data = await res.json();
        localStorage.setItem("admin_token", data.access_token);
        window.location.href = "/admin";
      } catch (err) {
        console.error("Erro no login:", err);
        showError("Erro de conexão. Tente novamente.");
        setLoading(false);
      }
    });

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        loginForm.dispatchEvent(new Event("submit"));
      }
    });
  </script>
</body>
</html>
