<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <title>Login - Urânia +</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',
              500:'#22c55e',600:'#1C8B3C',700:'#15803d',800:'#166534',900:'#14532d'
            }
          },
          fontFamily: {
            sans: ['Inter','system-ui','-apple-system','BlinkMacSystemFont','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .animate-fade-in-up{animation:fadeInUp .6s cubic-bezier(.4,0,.2,1) both}
    .animate-shake{animation:shake .4s ease}
    .loading{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
    .bg-pattern{background-image:radial-gradient(circle at 1px 1px, rgba(28,139,60,0.07) 1px, transparent 0);background-size:32px 32px}
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-50 via-slate-50 to-sky-50 font-sans text-gray-900 flex items-center justify-center p-4 sm:p-6 antialiased bg-pattern">

  <!-- Decorative blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-brand-200/30 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-sky-200/30 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-[420px] animate-fade-in-up">
    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl shadow-gray-900/5 border border-white/60 p-8 sm:p-10">

      <!-- Logo Section -->
      <div class="text-center mb-10">
        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-600 to-brand-700 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-600/25 hover:scale-105 transition-transform duration-300 overflow-hidden ring-4 ring-brand-100">
          <img src="https://i.postimg.cc/633Wxf2R/Whats-App-Image-2025-11-05-at-09-27-39.jpg" alt="Avatar Urânia +" class="w-full h-full object-cover" />
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-gray-900">Urânia +</h1>
        <p class="text-sm text-gray-500 mt-1.5 font-medium">Acesse o Painel Administrativo</p>
      </div>

      <!-- Error Message -->
      <div id="error-message" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium mb-6 hidden"></div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="username">Usuário</label>
          <input
            type="text" id="username" name="username"
            class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl bg-gray-50/50 text-gray-900 placeholder:text-gray-400 outline-none transition-all duration-200 focus:border-brand-500 focus:ring-4 focus:ring-brand-50 focus:bg-white hover:border-gray-300"
            placeholder="Digite seu usuário" required autocomplete="username" autofocus
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Senha</label>
          <input
            type="password" id="password" name="password"
            class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl bg-gray-50/50 text-gray-900 placeholder:text-gray-400 outline-none transition-all duration-200 focus:border-brand-500 focus:ring-4 focus:ring-brand-50 focus:bg-white hover:border-gray-300"
            placeholder="Digite sua senha" required autocomplete="current-password"
          />
        </div>

        <button type="submit" id="btn-login"
          class="w-full py-3.5 text-[15px] font-semibold text-white bg-gradient-to-r from-brand-600 to-brand-700 rounded-xl cursor-pointer transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-brand-600/25 active:translate-y-0 active:shadow-md disabled:opacity-50 disabled:cursor-not-allowed disabled:translate-y-0 disabled:shadow-none shadow-md shadow-brand-600/20 mt-2">
          Entrar
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center mt-8 text-xs text-gray-400 font-medium tracking-wide">
        Sistema de Gerenciamento de Chatbot
      </p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const btnLogin = document.getElementById("btn-login");
    const errorMessage = document.getElementById("error-message");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.remove("hidden");
      errorMessage.classList.add("animate-shake");
      setTimeout(() => {
        errorMessage.classList.add("hidden");
        errorMessage.classList.remove("animate-shake");
      }, 5000);
    }

    function setLoading(loading) {
      if (loading) {
        btnLogin.disabled = true;
        btnLogin.innerHTML = '<span class="loading"></span>Entrando...';
      } else {
        btnLogin.disabled = false;
        btnLogin.textContent = "Entrar";
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError("Por favor, preencha todos os campos.");
        return;
      }

      setLoading(true);
      errorMessage.classList.add("hidden");

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          showError(data.detail || "Usuário ou senha incorretos.");
          setLoading(false);
          return;
        }

        const data = await res.json();
        localStorage.setItem("admin_token", data.access_token);
        window.location.href = "/admin";
      } catch (err) {
        console.error("Erro no login:", err);
        showError("Erro de conexão. Tente novamente.");
        setLoading(false);
      }
    });

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        loginForm.dispatchEvent(new Event("submit"));
      }
    });
  </script>
</body>
</html>
