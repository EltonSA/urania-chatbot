<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversas - Urânia +</title>
  <link rel="stylesheet" href="/static/dashboard.css">
  <style>
    .conversations-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
    }
    
    .conversations-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .conversations-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .conversation-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .conversation-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }
    
    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .conversation-id {
      font-family: monospace;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .conversation-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    
    .conversation-preview {
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .conversation-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    
    .btn-action {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-action:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .btn-export {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
    }
    
    .pagination-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .pagination-btn:hover:not(:disabled) {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-left">
      <div class="logo-circle">💬</div>
      <div class="top-titles">
        <h1>Conversas</h1>
        <p>Visualize e exporte todas as conversas do chatbot</p>
      </div>
    </div>
    <div class="top-right">
      <div class="pill-status">
        <span class="pill-status-dot"></span>
        <span>Backend online</span>
      </div>
      <div class="top-links">
        <a href="/admin">Admin</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/conversations">Conversas</a>
        <a href="/widget" target="_blank">Abrir widget</a>
      </div>
    </div>
  </header>

  <main class="conversations-container">
    <div id="conversations-list" class="conversations-list">
      <div class="loading">Carregando conversas...</div>
    </div>
    
    <div id="pagination" class="pagination" style="display: none;"></div>
  </main>

  <script src="/static/dashboard.js"></script>
  <script>
    // Função para obter token de autenticação
    function getAuthToken() {
      return localStorage.getItem('admin_token');
    }

    function getAuthHeaders() {
      const token = getAuthToken();
      if (!token) {
        return {};
      }
      return {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      };
    }

    let currentPage = 1;
    const limit = 50;

    async function loadConversations(page = 1) {
      const token = getAuthToken();
      if (!token) {
        window.location.href = '/login';
        return;
      }

      const listEl = document.getElementById('conversations-list');
      listEl.innerHTML = '<div class="loading">Carregando conversas...</div>';

      try {
        const res = await fetch(`/admin/conversations/?page=${page}&limit=${limit}`, {
          headers: getAuthHeaders()
        });

        if (!res.ok) {
          if (res.status === 401) {
            window.location.href = '/login';
            return;
          }
          const errorText = await res.text().catch(() => '');
          console.error('Erro ao carregar conversas:', res.status, errorText);
          throw new Error(`Erro ${res.status}: ${errorText || 'Erro desconhecido'}`);
        }

        const data = await res.json();
        
        // Verifica se data é válido
        if (!data || typeof data !== 'object') {
          throw new Error('Resposta inválida do servidor');
        }
        currentPage = data.page;

        if (data.conversations.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">💬</div>
              <div>Nenhuma conversa encontrada</div>
            </div>
          `;
          document.getElementById('pagination').style.display = 'none';
          return;
        }

        listEl.innerHTML = data.conversations.map(conv => `
          <div class="conversation-item" onclick="viewConversation('${conv.session_id}')">
            <div class="conversation-header">
              <div>
                <div class="conversation-id">${conv.session_id}</div>
                <div class="conversation-meta" style="margin-top: 8px;">
                  <span>📅 ${conv.display_date || conv.started_at || conv.last_activity_at ? new Date(conv.display_date || conv.started_at || conv.last_activity_at).toLocaleString('pt-BR') : 'Data não disponível'}</span>
                  <span>💬 ${conv.message_count} mensagens</span>
                  ${conv.resolved !== null ? `<span>${conv.resolved === 1 ? '✅ Resolvido' : '❌ Não resolvido'}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="conversation-preview">${conv.preview}</div>
            <div class="conversation-actions" onclick="event.stopPropagation()">
              <button class="btn-action" onclick="viewConversation('${conv.session_id}')">Ver conversa</button>
              <button class="btn-action btn-export" onclick="exportConversation('${conv.session_id}', 'txt')">📄 TXT</button>
              <button class="btn-action btn-export" onclick="exportConversation('${conv.session_id}', 'pdf')">📑 PDF</button>
            </div>
          </div>
        `).join('');

        // Paginação
        if (data.pages > 1) {
          const paginationEl = document.getElementById('pagination');
          paginationEl.style.display = 'flex';
          paginationEl.innerHTML = `
            <button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadConversations(${currentPage - 1})">Anterior</button>
            <span style="padding: 0 16px;">Página ${currentPage} de ${data.pages}</span>
            <button class="pagination-btn" ${currentPage === data.pages ? 'disabled' : ''} onclick="loadConversations(${currentPage + 1})">Próxima</button>
          `;
        } else {
          document.getElementById('pagination').style.display = 'none';
        }

      } catch (err) {
        console.error('Erro ao carregar conversas:', err);
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div>Erro ao carregar conversas</div>
            <div style="margin-top: 8px; font-size: 12px; color: var(--muted);">${err.message || 'Erro desconhecido'}</div>
          </div>
        `;
      }
    }

    function viewConversation(sessionId) {
      window.location.href = `/conversation-view.html?session_id=${sessionId}`;
    }

    function exportConversation(sessionId, format) {
      const token = getAuthToken();
      if (!token) {
        alert('Você precisa estar autenticado');
        return;
      }

      const url = `/admin/conversations/${sessionId}/export/${format}`;
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', '');
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Carrega conversas ao iniciar
    loadConversations();
  </script>
</body>
</html>
