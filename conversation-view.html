<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizar Conversa - Urânia +</title>
  <link rel="stylesheet" href="/static/dashboard.css">
  <style>
    .conversation-view-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px;
    }
    
    .conversation-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .conversation-id {
      font-family: monospace;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg);
      padding: 6px 12px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 12px;
    }
    
    .conversation-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    
    .conversation-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .btn-action {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn-action:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .btn-export {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .message-avatar.user {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: white;
    }
    
    .message-avatar.assistant {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: white;
    }
    
    .message-content {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .message-role {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }
    
    .message-time {
      font-size: 12px;
      color: var(--muted);
    }
    
    .message-text {
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .message.user .message-content {
      background: var(--accent-light);
      border-color: var(--accent);
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-left">
      <div class="logo-circle">💬</div>
      <div class="top-titles">
        <h1>Visualizar Conversa</h1>
        <p>Detalhes completos da conversa</p>
      </div>
    </div>
    <div class="top-right">
      <div class="top-links">
        <a href="/conversations">← Voltar</a>
        <a href="/admin">Admin</a>
        <a href="/dashboard">Dashboard</a>
      </div>
    </div>
  </header>

  <main class="conversation-view-container">
    <div id="conversation-header" class="conversation-header" style="display: none;">
      <div class="conversation-id" id="session-id"></div>
      <div class="conversation-meta" id="conversation-meta"></div>
      <div class="conversation-actions">
        <button class="btn-action btn-export" onclick="exportConversation('txt')">📄 Exportar TXT</button>
        <button class="btn-action btn-export" onclick="exportConversation('pdf')">📑 Exportar PDF</button>
      </div>
    </div>
    
    <div id="messages-container" class="messages-container">
      <div class="loading">Carregando conversa...</div>
    </div>
  </main>

  <script>
    // Obtém session_id da URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    
    if (!sessionId) {
      document.getElementById('messages-container').innerHTML = 
        '<div class="empty-state">ID da conversa não fornecido</div>';
    }

    function getAuthToken() {
      return localStorage.getItem('admin_token');
    }

    function getAuthHeaders() {
      const token = getAuthToken();
      if (!token) {
        return {};
      }
      return {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      };
    }

    async function loadConversation() {
      if (!sessionId) return;

      const token = getAuthToken();
      if (!token) {
        window.location.href = '/login';
        return;
      }

      try {
        const res = await fetch(`/admin/conversations/${sessionId}`, {
          headers: getAuthHeaders()
        });

        if (!res.ok) {
          if (res.status === 401) {
            window.location.href = '/login';
            return;
          }
          if (res.status === 404) {
            document.getElementById('messages-container').innerHTML = 
              '<div class="empty-state">Conversa não encontrada</div>';
            return;
          }
          throw new Error(`Erro ${res.status}`);
        }

        const data = await res.json();

        // Atualiza cabeçalho
        document.getElementById('session-id').textContent = data.session_id;
        document.getElementById('conversation-meta').innerHTML = `
          <span>📅 Iniciada: ${new Date(data.started_at).toLocaleString('pt-BR')}</span>
          <span>💬 ${data.message_count} mensagens</span>
          ${data.resolved !== null ? `<span>${data.resolved === 1 ? '✅ Resolvido' : '❌ Não resolvido'}</span>` : ''}
        `;
        document.getElementById('conversation-header').style.display = 'block';

        // Renderiza mensagens
        const messagesEl = document.getElementById('messages-container');
        if (data.messages.length === 0) {
          messagesEl.innerHTML = '<div class="empty-state">Nenhuma mensagem nesta conversa</div>';
          return;
        }

        messagesEl.innerHTML = data.messages.map(msg => {
          const isUser = msg.role === 'user';
          const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleString('pt-BR') : '';
          return `
            <div class="message ${msg.role}">
              <div class="message-avatar ${msg.role}">
                ${isUser ? '👤' : '🤖'}
              </div>
              <div class="message-content">
                <div class="message-header">
                  <span class="message-role">${isUser ? 'Usuário' : 'Assistente'}</span>
                  ${timestamp ? `<span class="message-time">${timestamp}</span>` : ''}
                </div>
                <div class="message-text">${escapeHtml(msg.content)}</div>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error('Erro ao carregar conversa:', err);
        document.getElementById('messages-container').innerHTML = 
          '<div class="empty-state">Erro ao carregar conversa. Tente novamente.</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function exportConversation(format) {
      if (!sessionId) return;
      
      const token = getAuthToken();
      if (!token) {
        alert('Você precisa estar autenticado');
        return;
      }

      const url = `/admin/conversations/${sessionId}/export/${format}`;
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', '');
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Carrega conversa ao iniciar
    loadConversation();
  </script>
</body>
</html>
